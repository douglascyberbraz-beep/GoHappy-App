<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <!-- ════════════════════════════════════════════════════════════════
         SECURITY HEADERS — Defensa en profundidad contra XSS, clickjacking,
         MIME sniffing, leaks de referrer, abuse de permissions.
         ════════════════════════════════════════════════════════════════ -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob:; worker-src 'self' blob: https:; child-src 'self' blob: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-src 'self' https:; object-src 'none'; base-uri 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(), geolocation=(self), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=(), interest-cohort=()">

    <!-- viewport-fit=cover: esencial para notch/Dynamic Island/punch-hole -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GoHappy Family</title>

    <!-- iOS PWA — chrome native -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GoHappy Family">

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0B4C8F" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000"   media="(prefers-color-scheme: dark)">

    <!-- iOS touch icons (todas las resoluciones) -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/logo.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/logo.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/logo.png">
    <link rel="apple-touch-startup-image" href="assets/ESLOGAN.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="manifest" href="manifest.json?v=8.8.3">

    <!-- Resource hints — abrir conexiones críticas YA para reducir latencia primer fetch -->
    <link rel="preconnect" href="https://geminiproxy-cwdjjopdga-ew.a.run.app" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin>
    <link rel="dns-prefetch" href="https://tiles.openfreemap.org">
    <link rel="dns-prefetch" href="https://photon.komoot.io">

    <!-- Poppins (brand headings only — body usa system font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    </noscript>

    <!-- MapLibre GL JS 4.7 — motor 3D navegador premium (Google Maps 2026 style)

    <link href='js/lib/maplibre-gl.css?v=8.8.3' rel='stylesheet' />

    <!-- App CSS -->
    <link rel="stylesheet" href="css/main.css?v=8.8.3">
    <link rel="stylesheet" href="css/premium.css?v=8.8.3">
</head>

                </div>
            </div>
            <div class="splash-loader"></div>
            <!-- Versión silenciosa (solo data-attr para debug por consola) -->
            <div id="splash-version" data-version="v8.8.0" style="display:none;"></div>
        </div>

        <!-- Main Content Area inside #app -->
        <main id="main-content" class="hidden"></main>

        <!-- Map Container inside #app -->
        <div id="map-viewport-v11" class="map-viewport-v11" style="display: none;"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav hidden">
        <button class="nav-item" data-page="adventures">
            <span class="icon">🗺️</span>
            <span class="label">Aventuras</span>
        </button>

            <span class="icon">🧡</span>

        <button class="nav-item" data-page="today">
            <span class="icon">✨</span>

        <!-- Orbital Map Button (center) -->
        <button class="nav-item active" data-page="map">
            <div class="map-orb">

                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
            </div>
        </button>

        <button class="nav-item" data-page="ranking">
            <span class="icon">🏆</span>
            <span class="label">Top</span>
        </button>
        <button class="nav-item" data-page="moments">
            <span class="icon">💝</span>

        <button class="nav-item" data-page="profile">
            <span class="icon">👤</span>

        </button>

    <!-- MapLibre GL JS for 3D/Tilt/Rotate -->
    <!-- MapLibre GL JS 4.7 self-hosted (3D + WebGL) -->

    <!-- Firebase SDKs (Compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

    <!-- Global Error Catcher -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const container = document.getElementById('main-content');
            if (container) {
                container.innerHTML = `
                    <div style="color:red; background: white; position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; font-family: Inter, sans-serif;">
                        <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
                        <h3 style="color: #E74C3C; font-size: 20px; margin-bottom: 10px;">Error de Inicio</h3>
                        <p style="font-size: 14px; color: #333; margin: 10px 0; max-width: 300px;">${msg}</p>
                        <p style="font-size: 11px; color: #888;">${url} : L${line}</p>
                        <button onclick="localStorage.clear(); caches.keys().then(n=>{for(let x of n)caches.delete(x)}); location.reload(true);"
                                style="margin-top: 25px; background: linear-gradient(135deg,#0B4C8F,#0B71FC); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 10px 30px rgba(11,76,143,0.3);">
                            ♻️ Reiniciar App
                        </button>
                    </div>
                `;
            }
            return false;
        };
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                window.forceResetApp = () => {
                    localStorage.clear();
                    caches.keys().then(names => { for (let n of names) caches.delete(n); });
                    navigator.serviceWorker.getRegistrations().then(regs => { for (let r of regs) r.unregister(); });
                    setTimeout(() => window.location.reload(true), 500);
                };

                navigator.serviceWorker.register('sw.js?v=8.8.3').then(reg => {
                    console.log('[SW] GoHappy v5.2.0 registrado');
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.GoHappyToast && window.GoHappyToast.info('Nueva versión disponible. Recargando...', 2500);
                                setTimeout(() => window.location.reload(), 2600);
                            }
                        });
                    });
                }).catch(err => console.warn('[SW] Error al registrar:', err));
            });
        }
    </script>
